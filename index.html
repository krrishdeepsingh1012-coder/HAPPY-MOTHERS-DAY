<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day 🌸 - Perfect 3D Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            cursor: none;
        }

        /* Custom Cursor - Only on Desktop */
        .cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff6b9d, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            will-change: transform;
            display: none;
        }

        .cursor-follower {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255,107,157,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.2s ease;
            will-change: transform;
            display: none;
        }

        body:not(.mobile) .cursor,
        body:not(.mobile) .cursor-follower {
            display: block;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            animation: heroBgFloat 20s ease-in-out infinite;
        }

        @keyframes heroBgFloat {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            animation: heroFloat 4s ease-out;
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 10vw, 8rem);
            background: linear-gradient(45deg, #ff6b9d, #ffd700, #ff9a9e, #ff6b9d);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255,107,157,0.6);
            margin-bottom: 1rem;
            animation: textGlow 3s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 20px #ff6b9d); }
            to { filter: drop-shadow(0 0 30px #ffd700); }
        }

        .hero p {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(45deg, #fff, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        .cta-btn {
            position: relative;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 50px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 700;
            cursor: pointer;
            z-index: 5;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.2s forwards;
            box-shadow: 0 15px 35px rgba(255,107,157,0.4);
            transition: all 0.3s ease;
            will-change: transform;
            touch-action: manipulation;
        }

        .cta-btn:hover,
        .cta-btn:active {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(255,107,157,0.6);
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .cta-btn:hover::before,
        .cta-btn:active::before { 
            left: 100%; 
        }

        /* Universal Section Styles */
        .section {
            padding: 100px 20px;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .section:nth-child(even) {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        }

            font-family: 'Dancing Script', cursive;
            font-size:
